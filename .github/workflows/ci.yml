# Tier 1 (unit) + Tier 2 (golden scenario) tests — deterministic, no API keys.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Verify the production image builds AND the compiled CLI runs inside it.
  # This is the deploy unit — it must never be broken on main.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the worker image
        run: docker build -t offhook-agent:ci .
      - name: Smoke-test the built CLI in the image
        run: docker run --rm offhook-agent:ci node bin/offhook-agent.js help
