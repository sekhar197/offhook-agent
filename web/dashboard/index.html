<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>offhook · dashboard</title>
  <style>
    :root {
      --bg: #0b0d10; --panel: #14181d; --panel-2: #1b2128; --line: #232a33;
      --text: #e7ecf2; --dim: #8a96a4; --ember: #e8633a; --ember-2: #f0a23a;
      --ok: #46c46e; --bad: #e0556b; --warn: #e0a23a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    a { color: var(--ember-2); text-decoration: none; }
    header { display: flex; align-items: center; gap: 12px; padding: 16px 22px; border-bottom: 1px solid var(--line); }
    header .logo { font-weight: 700; letter-spacing: -.02em; font-size: 17px; }
    header .logo b { background: linear-gradient(90deg, var(--ember), var(--ember-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    header .sub { color: var(--dim); font-size: 12px; }
    .wrap { display: grid; grid-template-columns: 180px 1fr; min-height: calc(100vh - 57px); }
    nav { border-right: 1px solid var(--line); padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; }
    nav button { all: unset; cursor: pointer; padding: 9px 12px; border-radius: 8px; color: var(--dim); font-weight: 500; }
    nav button:hover { background: var(--panel); color: var(--text); }
    nav button.active { background: var(--panel-2); color: var(--text); }
    main { padding: 22px 26px; max-width: 920px; }
    h1 { font-size: 18px; margin: 0 0 16px; font-weight: 650; }
    .muted { color: var(--dim); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--dim); font-weight: 500; font-size: 12px; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    td { padding: 9px 10px; border-bottom: 1px solid var(--line); }
    tr.row { cursor: pointer; } tr.row:hover td { background: var(--panel-2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge.completed { background: rgba(70,196,110,.14); color: var(--ok); }
    .badge.transferred { background: rgba(224,162,58,.14); color: var(--warn); }
    .badge.caller_hangup { background: rgba(138,150,164,.16); color: var(--dim); }
    .badge.error { background: rgba(224,85,107,.16); color: var(--bad); }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .dot.on { background: var(--ok); } .dot.off { background: #3a434e; }
    .turn { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .who { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); }
    .who.agent { color: var(--ember-2); }
    .tools { color: var(--dim); font-size: 12px; margin-top: 3px; }
    .bar { height: 7px; background: var(--panel-2); border-radius: 4px; overflow: hidden; min-width: 90px; display: inline-block; vertical-align: middle; }
    .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--ember), var(--ember-2)); }
    button.primary { all: unset; cursor: pointer; background: linear-gradient(90deg, var(--ember), var(--ember-2)); color: #1a1206; font-weight: 700; padding: 10px 16px; border-radius: 9px; }
    button.ghost { all: unset; cursor: pointer; border: 1px solid var(--line); color: var(--text); padding: 9px 14px; border-radius: 9px; }
    pre { background: var(--panel-2); border-radius: 8px; padding: 12px; overflow: auto; font-size: 12.5px; white-space: pre-wrap; }
    .pass { color: var(--ok); } .block { color: var(--bad); }
    .kv { display: grid; grid-template-columns: 160px 1fr; gap: 6px 14px; }
    .kv .k { color: var(--dim); }
    .empty { color: var(--dim); padding: 30px 0; text-align: center; }
  </style>
</head>
<body>
  <header>
    <span class="logo"><b>offhook</b></span>
    <span class="sub">local dashboard · your calls never leave this machine</span>
  </header>
  <div class="wrap">
    <nav id="nav"></nav>
    <main id="view"><div class="empty">Loading…</div></main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
