<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>offhook · dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#060608; --card:#0d0e13; --card-2:#101117; --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.13);
      --text:#edeef4; --dim:#84867f; --dim:#8a8c98; --faint:#56586a;
      --vio-rgb:251,113,133; --cyan-rgb:129,140,248; --vio:rgb(var(--vio-rgb)); --cyan:rgb(var(--cyan-rgb)); --glow:rgba(var(--vio-rgb),.55);
      --ok:#3ddc97; --bad:#ff5d73; --warn:#e6c34f;
      --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans:'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --r:18px;
    }
    *{ box-sizing:border-box; } html,body{ height:100%; }
    body{ margin:0; background:var(--bg); color:var(--text); font:400 14px/1.55 var(--sans); -webkit-font-smoothing:antialiased; }
    body::before{ content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(900px 520px at 82% -12%, rgba(var(--vio-rgb),.20), transparent 60%),
        radial-gradient(760px 520px at 6% 4%, rgba(var(--cyan-rgb),.12), transparent 55%),
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px) 0 0/52px 52px,
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px) 0 0/52px 52px; }
    @media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } }
    :focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; border-radius:8px; }
    ::selection{ background:rgba(var(--vio-rgb),.34); }
    ::-webkit-scrollbar{ width:10px; height:10px; } ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.09); border-radius:8px; }
    a{ color:var(--cyan); text-decoration:none; } code{ font-family:var(--mono); background:rgba(255,255,255,.05); padding:1px 6px; border-radius:6px; font-size:.88em; }

    /* ── top nav ── */
    header{ position:sticky; top:0; z-index:9; display:flex; align-items:center; gap:22px; padding:14px 30px;
      border-bottom:1px solid var(--line); background:rgba(7,7,10,.7); backdrop-filter:blur(20px) saturate(1.4); }
    .brand{ display:flex; align-items:center; gap:10px; font-family:var(--mono); font-weight:600; font-size:16px; letter-spacing:-.02em; }
    .brand .mark{ width:11px; height:11px; border-radius:3px; background:linear-gradient(135deg,var(--vio),var(--cyan)); box-shadow:0 0 16px var(--glow); }
    .brand b{ background:linear-gradient(90deg,var(--vio),var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    nav{ display:flex; gap:4px; }
    nav button{ all:unset; cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:10px;
      color:var(--dim); font-size:13.5px; font-weight:450; transition:background .16s,color .16s; }
    nav button svg{ width:16px; height:16px; opacity:.8; }
    nav button:hover{ background:rgba(255,255,255,.04); color:var(--text); }
    nav button.active{ color:var(--text); background:linear-gradient(180deg, rgba(var(--vio-rgb),.16), rgba(var(--vio-rgb),.05));
      box-shadow:inset 0 0 0 1px rgba(var(--vio-rgb),.28), 0 0 18px -8px var(--glow); }
    .spacer{ flex:1; }
    .pill{ display:inline-flex; align-items:center; gap:8px; font-size:12px; color:var(--dim); font-family:var(--mono);
      padding:6px 12px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.02); }
    .pill .live{ width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 10px var(--ok); animation:pulse 2s infinite; }
    @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(61,220,151,.5)} 70%{box-shadow:0 0 0 7px rgba(61,220,151,0)} 100%{box-shadow:0 0 0 0 rgba(61,220,151,0)} }

    main{ padding:28px 30px 60px; max-width:1180px; margin:0 auto; animation:fade .35s ease; }
    @keyframes fade{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
    h1{ font-family:var(--mono); font-size:19px; font-weight:600; letter-spacing:-.02em; margin:0 0 20px; }
    .muted{ color:var(--dim); } .faint{ color:var(--faint); }

    /* ── bento grid ── */
    .bento-top{ display:grid; grid-template-columns:1.6fr 1fr; gap:16px; align-items:stretch; margin-bottom:16px; }
    .metrics2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .chartcard{ display:flex; flex-direction:column; }

    /* ── cards (3D, glass) ── */
    .card{ background:linear-gradient(180deg, var(--card-2), var(--card)); border:1px solid var(--line); border-radius:var(--r); padding:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 2px 6px rgba(0,0,0,.5), 0 36px 70px -34px rgba(0,0,0,1);
      transition:transform .18s, border-color .18s; }
    .card.hov:hover{ transform:translateY(-2px); border-color:var(--line-2); }
    /* 21st.dev signature: animated conic gradient border + spotlight */
    @property --bd{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
    .glowborder{ position:relative; }
    .glowborder::before{ content:''; position:absolute; inset:-1px; border-radius:inherit; padding:1.4px; pointer-events:none; z-index:1;
      background:conic-gradient(from var(--bd), transparent 0deg, rgba(var(--cyan-rgb),.95) 60deg, rgba(var(--vio-rgb),1) 130deg, transparent 200deg, transparent 360deg);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor;
      mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite:exclude;
      animation:spin 6s linear infinite; }
    @keyframes spin{ to{ --bd:360deg; } }
    .spot{ position:relative; overflow:hidden; }
    .spot::after{ content:''; position:absolute; top:-45%; left:50%; width:75%; height:90%; translate:-50% 0; pointer-events:none; z-index:0;
      background:radial-gradient(closest-side, rgba(var(--vio-rgb),.18), transparent 70%); }
    .metric{ background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.006)); border:1px solid var(--line); border-radius:var(--r);
      padding:17px 18px; display:flex; flex-direction:column; justify-content:space-between; min-height:118px; position:relative; overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 2px 6px rgba(0,0,0,.5), 0 30px 56px -30px rgba(0,0,0,1); transition:transform .18s; }
    .metric:hover{ transform:translateY(-2px); }
    .metric .ico{ width:34px; height:34px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:var(--cyan);
      background:linear-gradient(180deg, rgba(var(--vio-rgb),.24), rgba(var(--vio-rgb),.07)); border:1px solid rgba(var(--vio-rgb),.32);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16), 0 6px 16px -6px var(--glow); }
    .metric .ico svg{ width:17px; height:17px; }
    .metric .label{ color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:500; }
    .metric .val{ font-family:var(--mono); font-size:30px; font-weight:600; letter-spacing:-.03em; margin-top:3px; text-shadow:0 0 26px rgba(255,255,255,.12); }
    .metric .val.ok{ color:var(--ok); text-shadow:0 0 26px rgba(61,220,151,.3); }

    .ctitle{ font-family:var(--mono); color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:16px; display:flex; justify-content:space-between; }
    .chart{ display:flex; align-items:flex-end; gap:9px; height:calc(100% - 34px); min-height:150px; }
    .chart .b{ flex:1; background:linear-gradient(180deg, var(--cyan), var(--vio)); border-radius:7px 7px 3px 3px; min-height:6px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6), inset 0 0 16px rgba(255,255,255,.1), 0 0 26px -4px var(--glow);
      transition:transform .15s, filter .15s; transform-origin:bottom; }
    .chart .b:hover{ filter:brightness(1.16); transform:scaleY(1.05); }
    /* voice console: audio waveform + oscilloscope axis */
    .wave{ display:flex; align-items:center; gap:3px; height:calc(100% - 34px); min-height:172px; position:relative; z-index:2; }
    .wave::before{ content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:linear-gradient(90deg, transparent, rgba(var(--cyan-rgb),.4), transparent); }
    .wave .s{ flex:1; min-width:0; border-radius:4px; background:linear-gradient(180deg, var(--cyan), var(--vio)); box-shadow:0 0 11px -2px var(--glow); min-height:4px; transition:filter .15s, transform .15s; transform-origin:center; }
    .wave .s:hover{ filter:brightness(1.25); transform:scaleY(1.07); }
    .onair{ color:var(--vio); }
    /* live, breathing waveform + per-call mini signal */
    @keyframes wv{ 0%,100%{ transform:scaleY(.78) } 50%{ transform:scaleY(1.14) } }
    .wave .s{ animation:wv 1.7s ease-in-out infinite; }
    .mwave{ display:inline-flex; align-items:center; gap:2px; height:22px; }
    .mwave i{ width:2px; border-radius:1px; display:block; background:linear-gradient(180deg, var(--cyan), var(--vio)); box-shadow:0 0 6px -2px var(--glow); }

    table{ width:100%; border-collapse:collapse; }
    th{ text-align:left; color:var(--faint); font-family:var(--mono); font-weight:500; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; padding:0 12px 12px; }
    td{ padding:13px 12px; border-top:1px solid var(--line); font-size:13.5px; }
    tr.row{ cursor:pointer; transition:background .14s; } tr.row:hover td{ background:rgba(255,255,255,.025); }
    .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }

    .badge{ display:inline-block; padding:3px 11px; border-radius:999px; font-size:11px; font-weight:500; font-family:var(--mono); border:1px solid transparent; }
    .badge.completed{ background:rgba(61,220,151,.12); color:var(--ok); border-color:rgba(61,220,151,.24); }
    .badge.transferred{ background:rgba(var(--vio-rgb),.14); color:#b4abff; border-color:rgba(var(--vio-rgb),.28); }
    .badge.caller_hangup{ background:rgba(255,255,255,.05); color:var(--dim); }
    .badge.error{ background:rgba(255,93,115,.13); color:var(--bad); border-color:rgba(255,93,115,.24); }
    .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:9px; vertical-align:middle; }
    .dot.on{ background:var(--ok); box-shadow:0 0 9px rgba(61,220,151,.6); } .dot.off{ background:#333540; }

    .turn{ padding:12px 0; border-top:1px solid var(--line); } .turn:first-child{ border-top:none; }
    .who{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); margin-bottom:4px; }
    .who.agent{ color:var(--cyan); }
    .tools{ color:var(--dim); font-size:12px; margin-top:5px; font-family:var(--mono); }
    .bar{ height:6px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; min-width:120px; display:inline-block; vertical-align:middle; margin-right:9px; }
    .bar>i{ display:block; height:100%; background:linear-gradient(90deg, var(--vio), var(--cyan)); box-shadow:0 0 10px var(--glow); }

    button.primary{ all:unset; cursor:pointer; font-family:var(--sans); background:linear-gradient(135deg, var(--vio), var(--cyan)); color:#0a0a12;
      font-weight:600; font-size:13px; padding:9px 17px; border-radius:11px; box-shadow:0 6px 22px -8px var(--glow), inset 0 1px 0 rgba(255,255,255,.3); transition:transform .12s; }
    button.primary:hover{ transform:translateY(-1px); }
    button.ghost{ all:unset; cursor:pointer; border:1px solid var(--line-2); color:var(--text); font-size:13px; padding:8px 15px; border-radius:11px; transition:background .14s; }
    button.ghost:hover{ background:rgba(255,255,255,.04); }
    input, select, textarea{ font-family:var(--sans); }
    pre{ background:#0a0b10; border:1px solid var(--line); border-radius:12px; padding:14px; overflow:auto; font-size:12.5px; font-family:var(--mono); white-space:pre-wrap; line-height:1.6; }
    .pass{ color:var(--ok); } .block{ color:var(--bad); }
    .kv{ display:grid; grid-template-columns:175px 1fr; gap:12px 16px; align-items:center; } .kv .k{ color:var(--dim); font-size:13px; }
    .empty{ color:var(--dim); padding:64px 0; text-align:center; }
    ul{ margin:0; padding-left:18px; } li{ margin:5px 0; }

    @media (max-width:900px){ .bento-top{ grid-template-columns:1fr; } header{ flex-wrap:wrap; gap:12px; } }
  </style>
</head>
<body>
  <header>
    <span class="brand"><span class="mark"></span><b>offhook</b></span>
    <nav id="nav"></nav>
    <span class="spacer"></span>
    <span class="pill"><span class="live"></span> on air · this machine</span>
  </header>
  <main id="view"><div class="empty">Loading…</div></main>
  <script src="./app.js?v=6"></script>
</body>
</html>
