<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>offhook · dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080b; --panel: rgba(255,255,255,.025); --panel-2: rgba(255,255,255,.05); --panel-solid:#121319;
      --line: rgba(255,255,255,.08); --line-2: rgba(255,255,255,.14);
      --text: #ecedf2; --dim: #888a98; --faint:#5a5c6b;
      --ember: #7b6cff; --ember-2: #4cd3ff; --glow: rgba(123,108,255,.55);
      --ok: #46d39a; --bad: #ff5d73; --warn: #e6c34f;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html,body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 400 14px/1.55 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased; letter-spacing: -.005em;
    }
    body::before {
      content:''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(820px 460px at 88% -10%, rgba(123,108,255,.18), transparent 60%),
        radial-gradient(680px 480px at -8% 6%, rgba(76,211,255,.11), transparent 55%),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px) 0 0 / 46px 46px,
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px) 0 0 / 46px 46px;
    }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    :focus-visible { outline: 2px solid var(--ember-2); outline-offset: 2px; border-radius: 6px; }
    a { color: var(--ember-2); text-decoration: none; }
    ::selection { background: rgba(123,108,255,.32); }
    ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 8px; }

    header {
      position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 14px;
      padding: 13px 24px; border-bottom: 1px solid var(--line);
      background: rgba(10,10,14,.72); backdrop-filter: blur(18px) saturate(1.4);
    }
    header .logo { font-weight: 600; letter-spacing: -.03em; font-size: 17px; display:flex; align-items:center; gap:9px; }
    header .logo .mark { width:10px; height:10px; border-radius:50%;
      background: linear-gradient(135deg, var(--ember), var(--ember-2)); box-shadow: 0 0 14px var(--glow); }
    header .logo b { background: linear-gradient(90deg, var(--ember), var(--ember-2)); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 600; }
    header .sub { color: var(--faint); font-size: 12px; }
    header .spacer { flex: 1; }
    .pill { display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--dim);
      padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:var(--panel); }
    .pill .live { width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 0 rgba(70,211,154,.6); animation:pulse 2s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(70,211,154,.55)} 70%{box-shadow:0 0 0 7px rgba(70,211,154,0)} 100%{box-shadow:0 0 0 0 rgba(70,211,154,0)} }

    .wrap { display: grid; grid-template-columns: 208px 1fr; min-height: calc(100vh - 53px); }
    nav { border-right: 1px solid var(--line); padding: 16px 12px; display: flex; flex-direction: column; gap: 3px; }
    nav button { all: unset; cursor: pointer; display:flex; align-items:center; gap:11px; padding: 9px 12px; border-radius: 9px;
      color: var(--dim); font-weight: 450; font-size: 13.5px; transition: background .16s, color .16s; position: relative; }
    nav button svg { width:17px; height:17px; opacity:.85; }
    nav button:hover { background: var(--panel); color: var(--text); }
    nav button.active { background: var(--panel-2); color: var(--text); }
    nav button.active::before { content:''; position:absolute; left:-12px; top:9px; bottom:9px; width:3px; border-radius:3px;
      background: linear-gradient(180deg, var(--ember), var(--ember-2)); box-shadow: 0 0 10px var(--glow); }

    main { padding: 26px 30px; max-width: 980px; animation: fade .3s ease; }
    @keyframes fade { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
    h1 { font-size: 20px; margin: 0 0 18px; font-weight: 550; letter-spacing: -.02em; }
    .muted { color: var(--dim); } .faint{ color: var(--faint); }

    .card { background: linear-gradient(180deg, #15161d, #101117); border: 1px solid var(--line); border-radius: 16px; padding: 18px;
      margin-bottom: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 2px 5px rgba(0,0,0,.45), 0 32px 60px -30px rgba(0,0,0,1); }
    .metrics { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .metric { background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.008)); border:1px solid var(--line);
      border-radius:16px; padding:16px 17px; position:relative; overflow:hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 2px 5px rgba(0,0,0,.45), 0 28px 52px -28px rgba(0,0,0,1); }
    .metric .ico { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:13px;
      background:linear-gradient(180deg, rgba(123,108,255,.22), rgba(123,108,255,.08)); border:1px solid rgba(123,108,255,.32); color:var(--ember-2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 5px 14px -5px var(--glow); }
    .metric .ico svg{ width:16px; height:16px; }
    .metric .label{ color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.07em; }
    .metric .val{ font-family:var(--mono); font-size:27px; font-weight:500; margin-top:5px; letter-spacing:-.02em; text-shadow:0 0 22px rgba(255,255,255,.10); }
    .metric .val.ok{ color:var(--ok); text-shadow:0 0 22px rgba(70,211,154,.28); } .metric .val.warn{ color:var(--warn); }
    .ctitle { color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.07em; margin-bottom:14px; }
    .chart { display:flex; align-items:flex-end; gap:8px; height:108px; }
    .chart .b { flex:1; background:linear-gradient(180deg, var(--ember-2), var(--ember)); border-radius:6px 6px 3px 3px;
      min-height:6px; box-shadow: inset 0 1px 0 rgba(255,255,255,.55), inset 0 0 14px rgba(255,255,255,.1), 0 0 24px -4px var(--glow);
      transition: transform .15s, filter .15s; transform-origin:bottom; }
    .chart .b:hover { filter:brightness(1.14); transform:scaleY(1.04); }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--faint); font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; padding: 0 12px 11px; }
    td { padding: 12px; border-top: 1px solid var(--line); font-size: 13.5px; }
    tr.row { cursor: pointer; transition: background .14s; } tr.row:hover td { background: var(--panel-2); }
    .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 500; border:1px solid transparent; }
    .badge.completed { background: rgba(70,211,154,.12); color: var(--ok); border-color: rgba(70,211,154,.22); }
    .badge.transferred { background: rgba(230,195,79,.12); color: var(--warn); border-color: rgba(230,195,79,.24); }
    .badge.caller_hangup { background: rgba(136,138,152,.14); color: var(--dim); }
    .badge.error { background: rgba(255,93,115,.13); color: var(--bad); border-color: rgba(255,93,115,.24); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 9px; vertical-align: middle; }
    .dot.on { background: var(--ok); box-shadow: 0 0 9px rgba(70,211,154,.6); } .dot.off { background: #353844; }

    .turn { padding: 11px 0; border-top: 1px solid var(--line); }
    .turn:first-child{ border-top:none; }
    .who { font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--faint); margin-bottom:3px; }
    .who.agent { color: var(--ember-2); }
    .tools { color: var(--dim); font-size: 12px; margin-top: 5px; font-family:var(--mono); }
    .bar { height: 6px; background: var(--panel-2); border-radius: 5px; overflow: hidden; min-width: 110px; display: inline-block; vertical-align: middle; margin-right:8px; }
    .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--ember), var(--ember-2)); box-shadow: 0 0 8px var(--glow); }

    button.primary { all: unset; cursor: pointer; background: linear-gradient(135deg, var(--ember), var(--ember-2)); color: #1a0f06;
      font-weight: 600; font-size:13px; padding: 9px 16px; border-radius: 10px; box-shadow: 0 4px 18px -6px var(--glow); transition: transform .12s, box-shadow .12s; }
    button.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px -6px var(--glow); }
    button.primary:active { transform: translateY(0); }
    button.ghost { all: unset; cursor: pointer; border: 1px solid var(--line-2); color: var(--text); font-size:13px; padding: 8px 14px; border-radius: 10px; transition: background .14s, border-color .14s; }
    button.ghost:hover { background: var(--panel-2); border-color: var(--dim); }
    input, select, textarea { font-family: inherit; }
    pre { background: var(--panel-solid); border:1px solid var(--line); border-radius: 10px; padding: 13px; overflow: auto; font-size: 12.5px; font-family:var(--mono); white-space: pre-wrap; line-height:1.6; }
    .pass { color: var(--ok); } .block { color: var(--bad); }
    .kv { display: grid; grid-template-columns: 170px 1fr; gap: 11px 16px; align-items:center; }
    .kv .k { color: var(--dim); font-size:13px; }
    .empty { color: var(--dim); padding: 56px 0; text-align: center; }
    code { font-family: var(--mono); background: var(--panel-2); padding: 1px 6px; border-radius: 5px; font-size:.9em; }
    ul { margin:0; padding-left:18px; } li { margin:4px 0; }
  </style>
</head>
<body>
  <header>
    <span class="logo"><span class="mark"></span><b>offhook</b></span>
    <span class="sub">local dashboard</span>
    <span class="spacer"></span>
    <span class="pill"><span class="live"></span> live · on this machine</span>
  </header>
  <div class="wrap">
    <nav id="nav"></nav>
    <main id="view"><div class="empty">Loading…</div></main>
  </div>
  <script src="./app.js?v=2"></script>
</body>
</html>
